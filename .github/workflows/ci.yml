name: SOS App CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies & Build Frontend (sos-app)
        run: |
          cd sos-app
          npm install
          npm run build

      - name: Install Backend dependencies
        run: |
          cd sos-server
          npm install

      - name: Run Backend Logic Tests
        timeout-minutes: 5
        run: |
          node --test-concurrency=1 --test sos-server/tests/*.test.mjs

      - name: Clean up test artifacts
        run: |
          rm -f sos-server/*.db sos-server/*.sqlite sos-server/*.bak sos-server/material_manifest.json sos-server/metadata.json

      - name: Scan for forbidden tracked files
        run: |
          FORBIDDEN_FILES=$(git ls-files | grep -Ei '\.(pdf|zip|zim|iso|gguf|db|sqlite|mp4|mkv|avi|wmv)$' || true)
          
          if [ -n "$FORBIDDEN_FILES" ]; then
            echo "CRITICAL ERROR: Forbidden committed binary or database files detected:"
            echo "$FORBIDDEN_FILES"
            exit 1
          fi
          
          echo "Logistics check passed: No forbidden tracked media/index files found."
