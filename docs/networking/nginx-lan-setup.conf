# SurvivalOS Offline Local Area Network (LAN) Nginx Configuration Template
# Place this configuration in your Nginx config path (e.g. /etc/nginx/sites-available/survivalos)
# Enable it by symlinking: ln -s /etc/nginx/sites-available/survivalos /etc/nginx/sites-enabled/

server {
    listen 80;
    
    # Replace this with your computer's local LAN IP address (e.g. 192.168.1.100)
    # Or use '_' to match all incoming network requests on your local Wi-Fi router.
    server_name 192.168.1.100 localhost _ ;

    # Increase max body size for manual PDF uploads via mobile browser
    client_max_body_size 100M;

    # 1. Serves Compiled Frontend Static Assets (Vite app)
    location / {
        # Replace this path with the absolute path to your 'sos-app/dist' folder
        root /path/to/survival/sos-app/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Performance headers for local offline assets
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # 2. Proxies Backend API requests to the Node.js Express server
    location /api/ {
        # Proxies directly to the central Express server process (default port 3001)
        proxy_pass http://127.0.0.1:3001;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep-alive timeout for heavy PDF indexing operations
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
    }

    # 3. Proxies Server-Sent Events (SSE) chat stream without buffering
    location /api/chat {
        proxy_pass http://127.0.0.1:3001/api/chat;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # CRITICAL: Disable buffering for instant streaming token outputs from Ollama LLM
        proxy_buffering off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding on;
    }

    # 4. Serves static media assets (PDFs, raw videos, images)
    location /materials/ {
        # Points directly to the Express media route or file folders
        proxy_pass http://127.0.0.1:3001/materials/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
