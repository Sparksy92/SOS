# SurvivalOS System-wide Nginx Reverse Proxy Config Template
# Copy this file to /etc/nginx/sites-available/survivalos
# Link it to /etc/nginx/sites-enabled/survivalos to activate it.

server {
    listen 80;
    server_name survivalos.local; # Local DNS hostname or server IP address

    # Root directory for static production build assets
    location / {
        root /path/to/survival/sos-app/dist;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy to Node API backend
    location /api/ {
        proxy_pass http://localhost:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy to Node Materials directory
    location /materials/ {
        proxy_pass http://localhost:3001/materials/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
